<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Patients - MediFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <h1>MediFlow</h1>
</nav>

<main class="container">

    <div class="table-card">

        <h2 style="margin-bottom:20px;">Search Patient</h2>

        <input
            type="text"
            id="searchInput"
            placeholder="Enter patient name"
        >

        <button class="button" onclick="searchPatient()">
            Search
        </button>

        <br><br>

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Phone</th>
                </tr>
            </thead>

            <tbody id="results">

            </tbody>

        </table>

        <a href="index.html" class="back-link">
            ← Back to Dashboard
        </a>

    </div>

</main>

<script>

async function searchPatient() {

    const search =
        document.getElementById("searchInput").value;

    const response =
        await fetch(`/api/patients?search=${search}`);

    const patients =
        await response.json();

    const results =
        document.getElementById("results");

    results.innerHTML = "";

    patients.forEach(patient => {

        results.innerHTML += `
        <tr>
            <td>${patient.id}</td>
            <td>${patient.name}</td>
            <td>${patient.age}</td>
            <td>${patient.gender}</td>
            <td>${patient.phone}</td>
        </tr>
        `;
    });
}

</script>

</body>
</html>
